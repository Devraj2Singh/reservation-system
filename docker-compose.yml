
services:
  server:
    build:
      context: ./server
    container_name: reservation-server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    restart: unless-stopped

  client:
    build:
      context: ./client
    container_name: reservation-client
    ports:
      - "5173:5173"
    depends_on:
      - server
    restart: unless-stopped